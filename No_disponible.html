<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>No disponible</title>
  <style>
    body {
      background: #121212;
      font-family: 'Arial', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .card {
      background: rgba(255, 255, 255, 0.9);
      padding: 40px;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      animation: fadeIn 2s ease-in-out;
    }
      .card:hover {
      transform: scale(1.05);
      box-shadow: 0 12px 25px rgba(255,0,0,0.4);
    }
    h1 {
      color: darkred;
      font-size: 2.5em;
      margin-bottom: 15px;
    }
    p {
      color: #333;
      font-size: 1.2em;
      margin-bottom: 20px;
    }
    a.button {
      display: inline-block;
      padding: 12px 25px;
      background-color: darkred;
      color: white;
      text-decoration: none;
      border-radius: 6px;
      transition: background-color 0.3s ease;
    }
    a.button:hover {
      background-color: #a30000;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>⚠️ No disponible</h1>
    <p>Estamos mejorando nuestro sitio. Vuelve pronto.</p>
    <a href="index.html" class="button">Volver al inicio</a>
  </div>
</body>
</html>
